---
giltDir: ~/.gilt/clone
debug: false
parallel: true

repositories:
  - git: https://github.com/github/spec-kit.git
    version: main
    sources:
      # Copy all Markdown files from templates/commands/
      - src: templates/commands/*.md
        dstDir: plugins/spec-kit/specflows
        rename: "^(.*/)?(.*)\\.md$:speckit.\\2"
